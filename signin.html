<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Login</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Minecraft Login</h2>

  <input id="mcName" placeholder="Minecraft Name">

  <button onclick="login()">Code generieren</button>

  <p id="result"></p>
</div>

<script>
async function login() {
  const name = document.getElementById("mcName").value;

  if (!name) {
    document.getElementById("result").innerText = "Name fehlt";
    return;
  }

  try {
    const res = await fetch("https://mc-link-backend-production.up.railway.app/create-code", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
      "Dein Code: " + data.code;

  } catch (err) {
    document.getElementById("result").innerText =
      "Server nicht erreichbar";
  }
}
</script>

</body>
</html>
